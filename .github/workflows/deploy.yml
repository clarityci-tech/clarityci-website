name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, macOS, local-deploy]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Deploy to K3s nodes
        if: github.ref == 'refs/heads/main'
        run: |
          # Deploy to all K3s nodes
          NODES=("192.168.86.110" "192.168.86.119" "192.168.86.111")
          
          for NODE in "${NODES[@]}"; do
            echo "Deploying to $NODE..."
            ssh caine@$NODE "sudo mkdir -p /opt/clarityci-website && sudo rm -rf /opt/clarityci-website/*"
            tar czf - -C dist . | ssh caine@$NODE "sudo tar xzf - -C /opt/clarityci-website/"
            echo "Deployed to $NODE ✓"
          done

      - name: Restart deployment
        if: github.ref == 'refs/heads/main'
        run: |
          # Restart deployment via SSH to K3s server
          ssh caine@192.168.86.110 "kubectl rollout restart deployment/clarityci-website -n clarityci"
          ssh caine@192.168.86.110 "kubectl rollout status deployment/clarityci-website -n clarityci --timeout=120s"

      - name: Verify deployment
        if: github.ref == 'refs/heads/main'
        run: |
          ssh caine@192.168.86.110 "kubectl get pods -n clarityci"
          ssh caine@192.168.86.110 "kubectl get svc -n clarityci"
          ssh caine@192.168.86.110 "kubectl get ingress -n clarityci"
