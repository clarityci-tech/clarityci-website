apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarityci-website
  namespace: clarityci
  labels:
    app: clarityci-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clarityci-website
  template:
    metadata:
      labels:
        app: clarityci-website
    spec:
      containers:
      - name: website
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: html
        hostPath:
          path: /opt/clarityci-website
          type: DirectoryOrCreate
      - name: nginx-config
        configMap:
          name: nginx-config
