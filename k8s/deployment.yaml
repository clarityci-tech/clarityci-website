apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarityci-website
  namespace: clarityci
  labels:
    app: clarityci-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clarityci-website
  template:
    metadata:
      labels:
        app: clarityci-website
    spec:
      containers:
      - name: website
        image: ghcr.io/clarityci-tech/clarityci-website:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
